<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bee Flight — ASCII</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; width: 100vw; height: 100vh; }
    .title {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      font: 500 13px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: rgba(255,255,255,0.25); letter-spacing: 1px;
      text-transform: uppercase; pointer-events: none; z-index: 10;
    }
    .credit {
      position: fixed; bottom: 8px; right: 16px; z-index: 20;
      font: 400 11px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: rgba(255,255,255,0.2); text-decoration: none;
    }
    .credit:hover { color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div class="title">Bee Flight</div>
  <a class="credit" href="https://github.com/chenglou/pretext" target="_blank" rel="noreferrer">Powered by pretext</a>
  <script type="module" src="./main.ts"></script>
</body>
</html>

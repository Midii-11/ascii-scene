<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII Renderer — GLB Model Demo</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; width: 100vw; height: 100vh; }
    .controls {
      position: fixed; top: 16px; left: 16px; z-index: 10;
      font: 400 13px/1.6 "Helvetica Neue", sans-serif; color: rgba(255,255,255,0.5);
    }
    .controls label { display: block; margin-bottom: 4px; }
    .controls input[type=range] { width: 120px; vertical-align: middle; }
    .controls input[type=file] { margin-bottom: 8px; }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div class="controls">
    <input type="file" id="file-input" accept=".glb,.gltf">
    <label>Cell size: <input type="range" id="cell" min="3" max="16" value="6"> <span id="cell-val">6</span></label>
    <label>Brightness: <input type="range" id="bright" min="5" max="40" value="16"> <span id="bright-val">1.6</span></label>
    <label>Rotation: <input type="range" id="rot" min="0" max="20" value="5"> <span id="rot-val">0.5</span></label>
    <label>Color: <input type="color" id="color" value="#e6b828"></label>
  </div>
  <script type="module">
    import { createAsciiRenderer } from '../src/ascii-renderer.ts'

    const ascii = createAsciiRenderer({
      container: document.getElementById('canvas-container'),
      color: 0xe6b828,
    })

    ascii.start()

    // File upload
    document.getElementById('file-input').addEventListener('change', async (e) => {
      const file = e.target.files[0]
      if (!file) return
      const url = URL.createObjectURL(file)
      const model = await ascii.loadModel(url)
      model.playAll()
      URL.revokeObjectURL(url)
    })

    // Controls
    document.getElementById('cell').addEventListener('input', (e) => {
      const v = +e.target.value
      document.getElementById('cell-val').textContent = v
      ascii.setOptions({ cellSize: [v, Math.round(v * 1.67)] })
    })
    document.getElementById('bright').addEventListener('input', (e) => {
      const v = +e.target.value / 10
      document.getElementById('bright-val').textContent = v.toFixed(1)
      ascii.setOptions({ brightness: v })
    })
    document.getElementById('rot').addEventListener('input', (e) => {
      const v = +e.target.value / 10000
      document.getElementById('rot-val').textContent = (v * 1000).toFixed(1)
      ascii.setOptions({ autoRotateSpeed: v })
    })
    document.getElementById('color').addEventListener('input', (e) => {
      const hex = parseInt(e.target.value.slice(1), 16)
      ascii.setOptions({ color: hex })
    })
  </script>
</body>
</html>
